name: Bug report
description: Report reproducible incorrect NotDone behavior
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Remove secrets from logs and proof packets before submitting.
  - type: input
    id: version
    attributes:
      label: NotDone version or commit
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - CLI or CI
        - Claude Code
        - Codex
        - Gemini CLI
        - Runtime-neutral core
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the contract, commands, expected result, and observed result.
    validations:
      required: true
