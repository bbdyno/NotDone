name: Feature request
description: Propose a protocol, verifier, integration, or documentation improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What unsupported workflow or proof gap should NotDone address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Protocol or core
        - CLI or MCP
        - Claude Code
        - Codex
        - Gemini CLI
        - Documentation or localization
    validations:
      required: true
