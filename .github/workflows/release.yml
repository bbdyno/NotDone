name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version to build without publishing
        required: true
        default: "0.1.0"
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Verify, attest, and publish
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || format('v{0}', inputs.version) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require tagged commits to belong to main
        if: github.event_name == 'push'
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Set up npm trusted publishing client
        run: npm install --global npm@12.0.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release version
        run: node scripts/check-release-version.mjs "$RELEASE_TAG"

      - name: Run complete validation
        run: pnpm check

      - name: Build release packages
        run: |
          pnpm pack:release
          pnpm pack:verify
          cd artifacts
          sha256sum *.tgz > SHA256SUMS

      - name: Attest release packages
        uses: actions/attest@v4
        with:
          subject-path: artifacts/*.tgz

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: notdone-${{ env.RELEASE_TAG }}
          path: |
            artifacts/*.tgz
            artifacts/SHA256SUMS
          if-no-files-found: error

      - name: Publish packages to npm
        if: github.event_name == 'push'
        run: node scripts/publish-release.mjs

      - name: Create or update GitHub release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" artifacts/* --clobber
          else
            gh release create "$RELEASE_TAG" artifacts/* --generate-notes --verify-tag
          fi
